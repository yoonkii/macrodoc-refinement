<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDR Side Panel</title>
    <style>
      :root {
        /* ── Light mode ─────────────────────────────────── */
        --mdr-bg: #F7F5F0;
        --mdr-surface: #EFECE6;
        --mdr-surface-alt: #E8E4DD;
        --mdr-text: #2C2824;
        --mdr-text-secondary: #4A453E;
        --mdr-muted: #8A847A;
        --mdr-dim: #A8A29A;
        --mdr-border: #DDD8CF;
        --mdr-border-subtle: #E8E4DD;
        --mdr-amber: #D99A2B;
        --mdr-amber-hover: #C48B22;
        --mdr-amber-text: #1A1816;
        --mdr-amber-dim: rgba(217, 154, 43, 0.12);
        --mdr-amber-subtle: rgba(217, 154, 43, 0.06);
        --mdr-surface-hover: #E5E1DA;
        --mdr-focus-ring: rgba(217, 154, 43, 0.40);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          /* ── Dark mode (primary) ────────────────────────── */
          --mdr-bg: #0C0C0E;
          --mdr-surface: #161618;
          --mdr-surface-alt: #1E1E21;
          --mdr-text: #F0EDE8;
          --mdr-text-secondary: #C8C3BA;
          --mdr-muted: #7A756C;
          --mdr-dim: #5A5650;
          --mdr-border: #2A2A2E;
          --mdr-border-subtle: #222225;
          --mdr-amber: #E8A838;
          --mdr-amber-hover: #F0B848;
          --mdr-amber-text: #1A1816;
          --mdr-amber-dim: rgba(232, 168, 56, 0.15);
          --mdr-amber-subtle: rgba(232, 168, 56, 0.07);
          --mdr-surface-hover: #2A2A2E;
          --mdr-focus-ring: rgba(232, 168, 56, 0.35);
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--mdr-bg);
        color: var(--mdr-text);
        font-family: -apple-system, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
        font-size: 13px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--mdr-border);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--mdr-muted);
      }

      @keyframes mdr-blink {
        50% { opacity: 0; }
      }

      /* Textarea focus ring via CSS (can't do with inline styles alone) */
      textarea:focus {
        border-color: var(--mdr-amber) !important;
        box-shadow: 0 0 0 2px var(--mdr-focus-ring) !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
